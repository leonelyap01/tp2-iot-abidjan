# mosquitto/config/mosquitto.conf

# Port MQTT standard - écoute sur toutes les interfaces
listener 1883 0.0.0.0

# Port WebSocket
listener 9001
protocol websockets

# Autoriser les connexions sans authentification (pour le dev/TP)
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
